name: Auto-Grade

on: [push]

jobs:
  grade:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Enable docker-compose (compat)
        run: |
          sudo ln -sf /usr/bin/docker /usr/local/bin/docker-compose

      - name: Start services
        run: docker compose -f docker-compose.yml up -d --build

      - name: Wait for services
        run: |
          echo "Waiting for RabbitMQ..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:15672/api/overview -u guest:guest && break || sleep 2
          done
          echo "Waiting for Order Service..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/health && break || sleep 2
          done
          echo "Services ready."

      - name: Install test dependencies
        run: cd test && npm ci

      - name: Run test suite
        run: |
          echo " WHERE AM I "
          pwd
          echo " LIST ROOT "
          ls -la

          echo " LIST TEST FOLDER "
          ls -la test || true

          echo " INSTALL & RUN JEST "
          cd test
          pwd
          ls -la
          npm install
          npx jest --version
          npx jest --runInBand --forceExit --json --outputFile=results.json

          echo "=== AFTER JEST ==="
          ls -la
          test -f results.json

      - name: Generate grade report
        run: node grading/report.js test/results.json

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: grade-report
          path: grade-report.md

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.yml down -v

